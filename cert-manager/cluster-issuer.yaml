
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: alsoodanihamza12@gmail.com 
    privateKeySecretRef:
      name: letsencrypt-prod # secret holding your ACME account key
    solvers:
      - dns01:
          route53:
            region: eu-west-2
            
        selector:
          dnsZones:
            - "hamza-alsoodani.com" # your Route53 hosted zone



