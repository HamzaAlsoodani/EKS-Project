# Values for the kube-prometheus-stack chart (consumed by argocd/monitoring.yaml).
grafana:

  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
    hosts:
      - grafana.eks.hamza-alsoodani.com
    tls:
      - secretName: grafana-tls
        hosts:
          - grafana.eks.hamza-alsoodani.com


prometheus:
  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
    hosts:
      - prometheus.eks.hamza-alsoodani.com
    tls:
      - hosts:
          - prometheus.eks.hamza-alsoodani.com
        secretName: prometheus-tls